name: WDIO Tests with Allure Report

on:
  schedule:
    - cron: "0 10 * * *" # runs daily at 10:00 UTC
  workflow_dispatch: # allows manual trigger

jobs:
  wdio-tests:
    runs-on: ubuntu-latest
    # permissions:
    #   contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # Install and run Android Emulator
      - name: Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30 # Change to match WDIO, recommend >= 29
          target: default
          arch: x86_64
          profile: pixel
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "Waiting for emulator to boot..."
            adb wait-for-device

            bootCompleted=""
            until [ "$bootCompleted" = "1" ]; do
              bootCompleted=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              sleep 5
            done

            echo "Emulator reported boot completed!"
            echo "Adding extra wait time for system to stabilize..."
            sleep 30

            echo "Unlocking screen..."
            adb shell input keyevent 82 || true

            echo "Emulator is ready!"
            adb devices

      - name: Run WDIO tests (always continue)
        run: npm run test-report

      - name: Upload Allure report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🚀 WDIO Allure Report generated. Download it from GitHub Actions artifacts.\nGo to: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
